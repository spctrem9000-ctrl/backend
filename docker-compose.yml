version: '3.8'

services:
  api:
    build:
      context: .
      target: base
    command: npm run start:dev
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://divado:divado123@db:5432/divado_db?schema=public
      - JWT_SECRET=local_jwt_secret_change_me
      - JWT_REFRESH_SECRET=local_jwt_refresh_secret_change_me
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: divado
      POSTGRES_PASSWORD: divado123
      POSTGRES_DB: divado_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U divado -d divado_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
